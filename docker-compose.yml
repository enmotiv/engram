services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: engram
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: ${DB_PASSWORD:-engram_dev}
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U engram']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      retries: 5

  engram:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '8000:8000'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://engram:${DB_PASSWORD:-engram_dev}@db:5432/engram
      REDIS_URL: redis://redis:6379/0

  engram-dreamer:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://engram:${DB_PASSWORD:-engram_dev}@db:5432/engram
      REDIS_URL: redis://redis:6379/0
    command: arq engram.scheduler.WorkerSettings

volumes:
  pgdata:
  redisdata:
